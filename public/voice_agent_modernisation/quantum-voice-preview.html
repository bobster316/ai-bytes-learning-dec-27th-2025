<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Neural Voice Widget - Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            font-family: system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
        }

        .quantum-button {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 90px;
            height: 90px;
            cursor: pointer;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .orbital-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2px dashed rgba(6, 182, 212, 0.4);
            animation: rotate-ring 20s linear infinite;
        }

        .orbital-ring-2 {
            position: absolute;
            inset: 0.75rem;
            border-radius: 50%;
            border: 2px dotted rgba(139, 92, 246, 0.4);
            animation: rotate-ring-reverse 15s linear infinite;
        }

        .orbital-ring-3 {
            position: absolute;
            inset: 1.5rem;
            border-radius: 50%;
            border: 2px dashed rgba(236, 72, 153, 0.4);
            animation: rotate-ring 10s linear infinite;
        }

        @keyframes rotate-ring {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes rotate-ring-reverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }

        .quantum-core {
            position: absolute;
            inset: 1rem;
            border-radius: 50%;
            background: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 50%, #ec4899 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse-glow 3s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 0 30px #086c7f, 0 0 60px #086c7f, 0 0 90px #086c7f;
            }
            50% {
                box-shadow: 0 0 40px #8b5cf6, 0 0 80px #8b5cf6, 0 0 120px #8b5cf6;
            }
        }

        .pulse-wave {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: rgba(6, 182, 212, 0.3);
            animation: pulse-expand 2s ease-out infinite;
        }

        .pulse-wave:nth-child(2) {
            animation-delay: 0.66s;
        }

        .pulse-wave:nth-child(3) {
            animation-delay: 1.33s;
        }

        @keyframes pulse-expand {
            0% {
                transform: scale(1);
                opacity: 0.6;
            }
            100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        .sparkle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: linear-gradient(135deg, #06b6d4, #8b5cf6);
            animation: sparkle-float 2s ease-in-out infinite;
        }

        @keyframes sparkle-float {
            0%, 100% {
                transform: translate(0, 0) scale(0);
                opacity: 0;
            }
            50% {
                transform: translate(var(--tx), var(--ty)) scale(1);
                opacity: 1;
            }
        }

        .quantum-widget {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 450px;
            height: 650px;
            border-radius: 1.5rem;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(40px);
            box-shadow: 
                0 50px 100px -20px rgba(0, 0, 0, 0.7),
                0 30px 60px -30px rgba(8, 108, 127, 0.5);
            overflow: hidden;
            transform-origin: bottom right;
        }

        .gradient-mesh {
            position: absolute;
            inset: 0;
            opacity: 0.6;
            animation: mesh-flow 10s ease-in-out infinite;
        }

        @keyframes mesh-flow {
            0%, 100% {
                background: radial-gradient(circle at 20% 50%, rgba(8, 108, 127, 0.3) 0%, transparent 50%);
            }
            33% {
                background: radial-gradient(circle at 80% 50%, rgba(139, 92, 246, 0.3) 0%, transparent 50%);
            }
            66% {
                background: radial-gradient(circle at 50% 80%, rgba(236, 72, 153, 0.3) 0%, transparent 50%);
            }
        }

        .particle-canvas {
            position: absolute;
            inset: 0;
            opacity: 0.6;
        }

        .message-bubble {
            max-width: 80%;
            padding: 1.25rem;
            border-radius: 1.5rem;
            backdrop-filter: blur(10px);
        }

        .user-message {
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.9), rgba(8, 108, 127, 0.9));
            border: 1px solid rgba(6, 182, 212, 0.3);
            margin-left: auto;
        }

        .ai-message {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .control-button {
            width: 100%;
            padding: 1.25rem 2rem;
            border-radius: 9999px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 50%, #ec4899 100%);
            box-shadow: 0 10px 40px rgba(8, 108, 127, 0.5);
        }

        .control-button.listening {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            box-shadow: 0 10px 40px rgba(239, 68, 68, 0.5);
        }

        .shimmer {
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shimmer-slide 2s linear infinite;
        }

        @keyframes shimmer-slide {
            from { transform: translateX(-100%); }
            to { transform: translateX(100%); }
        }

        .audio-bar {
            width: 2px;
            background: linear-gradient(to top, #06b6d4, #8b5cf6);
            border-radius: 9999px;
            animation: audio-bounce 0.5s ease-in-out infinite;
        }

        @keyframes audio-bounce {
            0%, 100% { height: 20%; }
            50% { height: 80%; }
        }

        .welcome-card {
            display: inline-block;
            padding: 2rem;
            border-radius: 1.5rem;
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.1), rgba(139, 92, 246, 0.1));
            border: 2px solid rgba(6, 182, 212, 0.2);
            backdrop-filter: blur(10px);
            animation: welcome-float 4s ease-in-out infinite;
        }

        @keyframes welcome-float {
            0%, 100% {
                transform: scale(1) rotate(0deg);
            }
            25% {
                transform: scale(1.05) rotate(2deg);
            }
            75% {
                transform: scale(1.05) rotate(-2deg);
            }
        }

        .neural-avatar {
            width: 64px;
            height: 64px;
            position: relative;
            animation: avatar-rotate 3s linear infinite;
        }

        @keyframes avatar-rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .avatar-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2px solid rgba(6, 182, 212, 0.3);
        }

        .avatar-core {
            position: absolute;
            inset: 0.5rem;
            border-radius: 50%;
            background: linear-gradient(135deg, #06b6d4, #8b5cf6, #ec4899);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            animation: avatar-pulse 2s ease-in-out infinite;
        }

        @keyframes avatar-pulse {
            0%, 100% {
                box-shadow: 0 0 20px #086c7f;
            }
            50% {
                box-shadow: 0 0 40px #8b5cf6;
            }
        }

        .hidden {
            display: none;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .slide-up {
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <!-- Info Banner -->
    <div style="position: fixed; top: 0; left: 0; right: 0; background: rgba(8, 108, 127, 0.9); backdrop-filter: blur(10px); padding: 1rem; text-align: center; color: white; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.3);">
        <h1 style="font-size: 1.5rem; font-weight: bold; margin: 0 0 0.5rem 0;">🎨 Quantum Neural Voice Widget Preview</h1>
        <p style="margin: 0; opacity: 0.9;">Click the floating button in the bottom-right to see the revolutionary interface!</p>
    </div>

    <!-- Floating Quantum Button -->
    <div id="triggerButton" class="quantum-button" onclick="openWidget()">
        <div class="pulse-wave"></div>
        <div class="pulse-wave"></div>
        <div class="pulse-wave"></div>
        <div class="orbital-ring"></div>
        <div class="orbital-ring-2"></div>
        <div class="orbital-ring-3"></div>
        <div class="quantum-core">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" x2="12" y1="19" y2="22"/>
            </svg>
        </div>
        <!-- Sparkles -->
        <div class="sparkle" style="--tx: 40px; --ty: -40px; animation-delay: 0s;"></div>
        <div class="sparkle" style="--tx: -40px; --ty: -40px; animation-delay: 0.25s;"></div>
        <div class="sparkle" style="--tx: 40px; --ty: 40px; animation-delay: 0.5s;"></div>
        <div class="sparkle" style="--tx: -40px; --ty: 40px; animation-delay: 0.75s;"></div>
    </div>

    <!-- Main Widget -->
    <div id="mainWidget" class="quantum-widget hidden">
        <div class="gradient-mesh"></div>
        <canvas id="particleCanvas" class="particle-canvas" width="450" height="650"></canvas>
        
        <!-- Noise texture -->
        <div style="position: absolute; inset: 0; opacity: 0.05; background-image: url('data:image/svg+xml,%3Csvg viewBox=\'0 0 400 400\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cfilter id=\'noiseFilter\'%3E%3CfeTurbulence type=\'fractalNoise\' baseFrequency=\'3.5\' numOctaves=\'4\' stitchTiles=\'stitch\'/%3E%3C/filter%3E%3Crect width=\'100%25\' height=\'100%25\' filter=\'url(%23noiseFilter)\'/%3E%3C/svg%3E');"></div>

        <!-- Content -->
        <div style="position: relative; height: 100%; display: flex; flex-direction: column; backdrop-filter: blur(2px); background: rgba(255, 255, 255, 0.02);">
            <!-- Header -->
            <div style="padding: 1.5rem; border-bottom: 1px solid rgba(255, 255, 255, 0.1); background: linear-gradient(to right, rgba(255, 255, 255, 0.05), transparent);">
                <div style="display: flex; align-items: center; justify-content: space-between;">
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <div class="neural-avatar">
                            <div class="avatar-ring" style="transform: rotateX(60deg);"></div>
                            <div class="avatar-ring" style="transform: rotateY(60deg);"></div>
                            <div class="avatar-core">A</div>
                        </div>
                        <div>
                            <h2 style="font-size: 1.5rem; font-weight: bold; background: linear-gradient(90deg, #06b6d4, #8b5cf6, #ec4899, #06b6d4); background-size: 200% 100%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; animation: gradient-shift 5s linear infinite;">Aria</h2>
                            <div style="display: flex; align-items: center; gap: 0.5rem; margin-top: 0.25rem;">
                                <div style="width: 8px; height: 8px; border-radius: 50%; background: #06b6d4; animation: pulse-dot 1.5s ease-in-out infinite;"></div>
                                <p id="statusText" style="font-size: 0.875rem; color: rgba(6, 182, 212, 0.8); margin: 0;">Neural pathways ready</p>
                            </div>
                        </div>
                    </div>
                    <div style="display: flex; gap: 0.5rem;">
                        <button onclick="closeWidget()" style="padding: 0.75rem; border-radius: 50%; background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05)); border: 1px solid rgba(255, 255, 255, 0.1); cursor: pointer; transition: all 0.3s;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#06b6d4" stroke-width="2">
                                <line x1="18" y1="6" x2="6" y2="18"/>
                                <line x1="6" y1="6" x2="18" y2="18"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Messages Area -->
            <div id="messagesArea" style="flex: 1; overflow-y: auto; padding: 1.5rem;">
                <div style="text-align: center; padding: 4rem 0;">
                    <div class="welcome-card">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#06b6d4" stroke-width="2" style="margin: 0 auto 1rem;">
                            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                        </svg>
                        <p style="font-size: 1.25rem; color: rgb(165, 243, 252); margin: 0 0 0.5rem 0; font-weight: 600;">Welcome to AI Bytes Learning</p>
                        <p style="font-size: 0.875rem; color: rgba(6, 182, 212, 0.7); margin: 0;">Activate the quantum interface to begin</p>
                    </div>
                </div>
            </div>

            <!-- Audio Visualization (hidden by default) -->
            <div id="audioViz" class="hidden" style="padding: 0 1.5rem 1rem;">
                <div style="height: 64px; border-radius: 1rem; background: linear-gradient(to right, rgba(6, 182, 212, 0.1), rgba(139, 92, 246, 0.1), rgba(236, 72, 153, 0.1)); border: 1px solid rgba(255, 255, 255, 0.1); overflow: hidden; display: flex; align-items: center; justify-content: center; gap: 2px; padding: 0 0.5rem;">
                    <div class="audio-bar" style="animation-delay: 0s;"></div>
                    <div class="audio-bar" style="animation-delay: 0.1s;"></div>
                    <div class="audio-bar" style="animation-delay: 0.2s;"></div>
                    <div class="audio-bar" style="animation-delay: 0.3s;"></div>
                    <div class="audio-bar" style="animation-delay: 0.4s;"></div>
                    <div class="audio-bar" style="animation-delay: 0.5s;"></div>
                    <div class="audio-bar" style="animation-delay: 0.4s;"></div>
                    <div class="audio-bar" style="animation-delay: 0.3s;"></div>
                    <div class="audio-bar" style="animation-delay: 0.2s;"></div>
                    <div class="audio-bar" style="animation-delay: 0.1s;"></div>
                </div>
            </div>

            <!-- Controls -->
            <div style="padding: 1.5rem; border-top: 1px solid rgba(255, 255, 255, 0.1); background: linear-gradient(to top, rgba(0, 0, 0, 0.2), transparent);">
                <button id="controlButton" onclick="toggleListening()" class="control-button">
                    <div class="shimmer"></div>
                    <div style="position: relative; display: flex; align-items: center; justify-content: center; gap: 0.75rem;">
                        <svg id="micIcon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                            <line x1="12" x2="12" y1="19" y2="22"/>
                        </svg>
                        <span id="buttonText" style="font-size: 1.125rem;">Activate Neural Interface</span>
                    </div>
                </button>

                <div style="margin-top: 1rem; display: flex; align-items: center; justify-content: center; gap: 1rem; font-size: 0.75rem; color: rgba(6, 182, 212, 0.6);">
                    <div style="display: flex; align-items: center; gap: 0.25rem;">
                        <div style="width: 6px; height: 6px; border-radius: 50%; background: #06b6d4; animation: pulse-dot 2s ease-in-out infinite;"></div>
                        <span>Real-time Processing</span>
                    </div>
                    <div style="width: 1px; height: 12px; background: rgba(6, 182, 212, 0.2);"></div>
                    <div style="display: flex; align-items: center; gap: 0.25rem;">
                        <div style="width: 6px; height: 6px; border-radius: 50%; background: #8b5cf6; animation: pulse-dot 2s ease-in-out infinite; animation-delay: 0.5s;"></div>
                        <span>Neural Network Active</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isListening = false;
        let particles = [];
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');

        // Initialize particles
        for (let i = 0; i < 60; i++) {
            particles.push({
                angle: (i / 60) * Math.PI * 2,
                radius: 80 + Math.random() * 60,
                z: Math.random() * 200 - 100,
                speed: 0.01 + Math.random() * 0.02,
                size: 2 + Math.random() * 4,
                color: ['#086c7f', '#06b6d4', '#8b5cf6', '#ec4899', '#f59e0b'][Math.floor(Math.random() * 5)],
                pulse: Math.random() * Math.PI * 2
            });
        }

        // Particle animation
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            particles.forEach(particle => {
                particle.angle += particle.speed;
                particle.pulse += 0.05;

                const x = centerX + Math.cos(particle.angle) * particle.radius;
                const y = centerY + Math.sin(particle.angle) * particle.radius + Math.sin(particle.pulse) * 20;
                const z = particle.z + Math.sin(particle.angle + particle.pulse) * 30;

                const scale = 200 / (200 + z);
                const projX = centerX + (x - centerX) * scale;
                const projY = centerY + (y - centerY) * scale;
                const size = particle.size * scale;

                const intensity = Math.sin(particle.pulse);
                const alpha = Math.floor((0.4 + intensity * 0.6) * 255).toString(16).padStart(2, '0');

                // Glow
                const gradient = ctx.createRadialGradient(projX, projY, 0, projX, projY, size * 3);
                gradient.addColorStop(0, particle.color + 'ff');
                gradient.addColorStop(0.5, particle.color + alpha);
                gradient.addColorStop(1, particle.color + '00');

                ctx.beginPath();
                ctx.arc(projX, projY, size * 3, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // Core
                ctx.beginPath();
                ctx.arc(projX, projY, size, 0, Math.PI * 2);
                ctx.fillStyle = particle.color;
                ctx.fill();
            });

            // Central core
            const coreSize = 40 + (isListening ? 20 : 0);
            const coreGradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, coreSize);
            
            if (isListening) {
                coreGradient.addColorStop(0, 'rgba(239, 68, 68, 0.8)');
                coreGradient.addColorStop(0.5, 'rgba(239, 68, 68, 0.4)');
                coreGradient.addColorStop(1, 'rgba(239, 68, 68, 0)');
            } else {
                coreGradient.addColorStop(0, 'rgba(6, 182, 212, 0.8)');
                coreGradient.addColorStop(0.5, 'rgba(139, 92, 246, 0.4)');
                coreGradient.addColorStop(1, 'rgba(236, 72, 153, 0)');
            }

            ctx.beginPath();
            ctx.arc(centerX, centerY, coreSize, 0, Math.PI * 2);
            ctx.fillStyle = coreGradient;
            ctx.fill();

            requestAnimationFrame(animateParticles);
        }

        function openWidget() {
            document.getElementById('triggerButton').classList.add('hidden');
            const widget = document.getElementById('mainWidget');
            widget.classList.remove('hidden');
            widget.classList.add('slide-up');
            animateParticles();
        }

        function closeWidget() {
            document.getElementById('mainWidget').classList.add('hidden');
            document.getElementById('triggerButton').classList.remove('hidden');
        }

        function toggleListening() {
            isListening = !isListening;
            const button = document.getElementById('controlButton');
            const buttonText = document.getElementById('buttonText');
            const statusText = document.getElementById('statusText');
            const audioViz = document.getElementById('audioViz');

            if (isListening) {
                button.classList.add('listening');
                buttonText.textContent = 'Quantum Link Active';
                statusText.textContent = 'Quantum receptors active';
                
                // Simulate message after 3 seconds
                setTimeout(() => {
                    addMessage('user', 'What courses are available on your platform?');
                    toggleListening();
                    
                    setTimeout(() => {
                        statusText.textContent = 'Synapses processing...';
                        audioViz.classList.remove('hidden');
                        
                        setTimeout(() => {
                            addMessage('ai', 'We offer a wide range of courses in AI, Machine Learning, Web Development, Data Science, and more! Each course is designed with interactive lessons and hands-on projects. Would you like to explore a specific category?');
                            audioViz.classList.add('hidden');
                            statusText.textContent = 'Neural pathways ready';
                        }, 2000);
                    }, 1000);
                }, 3000);
            } else {
                button.classList.remove('listening');
                buttonText.textContent = 'Activate Neural Interface';
                statusText.textContent = 'Neural pathways ready';
            }
        }

        function addMessage(role, content) {
            const messagesArea = document.getElementById('messagesArea');
            messagesArea.innerHTML = '';

            const messageDiv = document.createElement('div');
            messageDiv.className = `message-bubble ${role}-message fade-in`;
            messageDiv.style.marginBottom = '1rem';
            
            if (role === 'user') {
                messageDiv.style.marginLeft = 'auto';
                messageDiv.style.textAlign = 'right';
            }

            messageDiv.innerHTML = `
                <p style="color: ${role === 'user' ? 'white' : 'rgb(165, 243, 252)'}; margin: 0; font-size: 0.875rem; line-height: 1.5;">${content}</p>
                <p style="color: ${role === 'user' ? 'rgba(255, 255, 255, 0.5)' : 'rgba(6, 182, 212, 0.5)'}; margin: 0.5rem 0 0 0; font-size: 0.75rem;">${new Date().toLocaleTimeString()}</p>
            `;
            messagesArea.appendChild(messageDiv);
        }

        // Additional CSS animations
        const style = document.createElement('style');
        style.textContent = `
            @keyframes pulse-dot {
                0%, 100% { opacity: 0.3; transform: scale(1); }
                50% { opacity: 1; transform: scale(1.5); }
            }
            @keyframes gradient-shift {
                0% { background-position: 0% 50%; }
                100% { background-position: 200% 50%; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
